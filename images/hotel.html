<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projet volkeno1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=browse" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="w-[80%] p-6 mx-auto">
        <div class="flex text-gray-500">
            <span class="material-symbols-outlined">arrow_back</span>
            <h1 class="uppercase text-l font-bold text-gray-600">CRéER UN NOUVEAU HôTEL</h1>
        </div>
        <hr class="border border-dashed border-gray-400 mb-3">
        <form action="" class="w-full">
            <div class="flex gap-4 justify-center w-full items-center p-2">
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">Nom de l'hôtel</label>
                    <input type="text" placeholder="CAP Mariane"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">Adresse</label>
                    <input type="text" placeholder="ex:, île du saloum"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
            </div>
            <div class="flex gap-4 justify-center w-full items-center p-2">
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">E-mail</label>
                    <input type="email" placeholder="exemple@gmail.com"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">Téléphone</label>
                    <input type="text" placeholder="ex:77 777 77 77"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
            </div>
            <div class="flex gap-4 justify-center w-full items-center p-2">
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">Prix par nuit</label>
                    <input type="text" placeholder="ex:25000 XOF"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
                <div class="flex flex-col w-[50%]">
                    <label class="pb-2" for="">Devise</label>
                    <input type="text" placeholder="ex:XOF"
                        class="outline-none border border-gray-400 p-[5px] rounded-xl w-full">
                </div>
            </div>

            <div class="flex w-full">
                <div class="flex flex-col w-[100%]">
                    <label for="" class="p-2">Ajouter une photo</label>
                    <textarea name="" id="" placeholder="Ajouter une photo"
                        class="p-12 border border-dashed border-black h-[30vh] outline-none text-center"></textarea>
                </div>
            </div>
            <button class="text-white bg-[rgb(85,85,85)] p-2 m-2 float-end rounded-xl text-sm px-7 mx-auto">Enregister</button>
        </form>

    </div>
</body>

</html>
