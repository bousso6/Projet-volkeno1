<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet volkeno1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="">
    <div class="container1 relative bg-[url(/images/back.png)] w-full h-[100vh]">
        <div class="container2 absolute inset-0 bg-black/80"></div>
        <div class="formulaire flex flex-col justify-center items-center justify-start min-h-[100vh] m-0">
            <div class="titre relative z-10 flex items-center gap-3 pb-6">
                <i class="fa-chisel fa-regular fa-bookmark fa-xl" style="color: white;"></i>
                <h2 class=" titre2 text-white font-bold text-l">RED PRODUCT</h2>
            </div>
            <form action=""> 
                <div class=" relative bg-white px-4 py-5">
                    <p class="text-sm pb-2">Inscrivez-vous en tant que Admin</p>
                    <div class=" inp flex flex-col">
                        <input class="border-b border-b-solid border-b-gray-300 pt-[15px] pb-3 outline-none" type="text" name="" id="" placeholder="Nom">
                        <input class="border-b border-b-solid border-b-gray-300 pt-[15px] pb-3 outline-none" type="email" name="" id="" placeholder="Email">
                        <input class="border-b border-b-solid border-b-gray-300 pt-[15px] pb-3 outline-none" type="password" placeholder="Mot de passe">
                        <div class="flex pt-7 gap-2">
                            <input class="w-[5%]" type="checkbox">
                            <p class="text-sm">Accepter les termes et la politique</p>
                        </div>
                    </div>
                    <div class="bg-[#45484B] text-white text-center py-1 w-full mt-7 rounded ">
                        <button class=""><a href="inscrire.html">S'inscrire</a></button>
                    </div>
                </div>
            </form>
            <p class="text-white relative text-sm pt-3">Vous avez déja un compte? <span class="text-[#FFD964] font-semibold"><a href="connexion.html">Se connecter</a></span></p>
        </div>
    </div>
    <script src="script.js"></script>

</html>
